name: Publish signed APK

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Install required Android SDK packages
        run: |
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-36.1" \
            "build-tools;36.0.0"

      - name: Check tag against versionName
        shell: bash
        run: |
          app_version=$(sed -n 's/.*versionName = "\([^"]*\)".*/\1/p' app/build.gradle.kts)
          tag_version="${GITHUB_REF_NAME#v}"
          test -n "$app_version"
          test "$app_version" = "$tag_version"

      - name: Run unit tests and lint
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon testDebugUnitTest lintDebug

      - name: Validate release secrets
        shell: bash
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
          RELEASES_TOKEN: ${{ secrets.RELEASES_TOKEN }}
        run: |
          test -n "$RELEASE_KEYSTORE_BASE64"
          test -n "$RELEASE_STORE_PASSWORD"
          test -n "$RELEASE_KEY_ALIAS"
          test -n "$RELEASE_KEY_PASSWORD"
          test -n "$RELEASES_TOKEN"

      - name: Restore release keystore
        shell: bash
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          printf '%s' "$RELEASE_KEYSTORE_BASE64" \
            | base64 --decode \
            > "$RUNNER_TEMP/cannsheet-release.jks"

      - name: Build signed release APK
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/cannsheet-release.jks
          STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon clean assembleRelease

      - name: Verify, name, and hash APK
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          source_apk="app/build/outputs/apk/release/app-release.apk"
          apk="Cannsheet-Mobile-${version}.apk"
          test -f "$source_apk"
          cp "$source_apk" "$apk"
          "$ANDROID_HOME/build-tools/36.0.0/apksigner" \
            verify --verbose --print-certs "$apk"
          sha256sum "$apk" > "${apk}.sha256"

      - name: Publish APK-only GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.RELEASES_TOKEN }}
          RELEASE_REPOSITORY: noamvb/cannsheet-mobile-releases
        run: |
          version="${GITHUB_REF_NAME#v}"
          apk="Cannsheet-Mobile-${version}.apk"

          if gh release view "$GITHUB_REF_NAME" \
            --repo "$RELEASE_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" \
              "$apk" "${apk}.sha256" \
              --clobber \
              --repo "$RELEASE_REPOSITORY"
          else
            gh release create "$GITHUB_REF_NAME" \
              "$apk" "${apk}.sha256" \
              --title "Cannsheet Mobile ${version}" \
              --notes "Signed Cannsheet Mobile ${version} APK." \
              --repo "$RELEASE_REPOSITORY"
          fi

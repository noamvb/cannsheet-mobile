name: Cannsheet PR checks

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cannsheet-pr-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  cannsheet-android-pr-validation:
    name: Cannsheet Android PR validation
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Android SDK tools
        uses: android-actions/setup-android@v3

      - name: Install project Android SDK packages
        run: |
          sdkmanager \
            "platforms;android-36.1" \
            "build-tools;36.0.0"

      - name: Set up Gradle caching
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Run backend analytics tests
        run: node tests/backend_analytics_test.js

      - name: Run Android unit tests and build debug APK
        run: ./gradlew --no-daemon testDebugUnitTest assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: cannsheet-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 7
